<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binnas Resonance Piano</title>
    <style>
        :root {
            --bg-color: #0a0a0c; 
            --accent-color: #00f2ff; 
            --key-white: #f8f9fa;
            --key-black: #1a1a1a;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            height: 100vh; 
            display: flex;
            flex-direction: column; 
            justify-content: flex-end;
            overflow: hidden; 
            font-family: 'Pretendard', sans-serif;
        }

        /* 중앙 가이드 문구 - 사라지지 않고 항상 유지 */
        #intro-guide {
            position: absolute; 
            top: 18%; 
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center; 
            z-index: 100; 
            pointer-events: none;
        }

        #intro-guide h1 {
            font-weight: 200; 
            letter-spacing: 20px; 
            font-size: 3rem;
            margin: 0; color: var(--accent-color);
            text-shadow: 0 0 20px rgba(0, 242, 255, 0.4);
            transition: all 0.1s ease; /* 연주 시 반응을 위한 트랜지션 */
        }

        #intro-guide p {
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 5px; 
            font-size: 0.9rem; 
            margin-top: 15px;
        }

        /* 연주 중 텍스트가 반짝이는 효과 */
        #intro-guide.pulse h1 {
            text-shadow: 0 0 50px var(--accent-color);
            transform: scale(1.05);
            opacity: 1;
        }

        .piano-container {
            display: flex; 
            justify-content: center;
            width: 100%; 
            padding-bottom: 60px; 
            perspective: 1500px;
        }

        .key {
            position: relative; 
            width: 55px; 
            height: 320px;
            background: var(--key-white); 
            border-radius: 0 0 8px 8px;
            margin: 0 3px; 
            cursor: pointer;
            display: flex; 
            align-items: flex-end; 
            justify-content: center;
            padding-bottom: 20px; 
            font-size: 13px; 
            font-weight: bold; 
            color: #bbb;
            transition: all 0.1s ease;
            box-shadow: 0 15px 30px rgba(0,0,0,0.6); 
            user-select: none;
        }

        .key.black {
            width: 38px; 
            height: 200px; 
            background: var(--key-black);
            color: #555; 
            margin-left: -22px; 
            margin-right: -22px;
            z-index: 5; 
            border-radius: 0 0 5px 5px;
        }

        .key.active {
            background: #fff !important;
            transform: rotateX(-10deg) translateY(10px);
            box-shadow: 0 0 40px var(--accent-color);
            color: var(--accent-color);
        }

        .key.active::after {
            content: ""; 
            position: absolute; 
            bottom: 100%; 
            left: 50%;
            transform: translateX(-50%); 
            width: 100%;
            background: linear-gradient(to top, var(--accent-color), transparent);
            filter: blur(12px); 
            animation: lightRay 0.7s ease-out forwards;
        }

        @keyframes lightRay {
            0% { height: 0; opacity: 0.8; }
            100% { height: 450px; opacity: 0; }
        }

        .particle {
            position: absolute; 
            width: 5px; 
            height: 5px;
            background: var(--accent-color); 
            border-radius: 50%;
            pointer-events: none; 
            box-shadow: 0 0 10px var(--accent-color);
            animation: eleganceExplode 0.8s ease-out forwards;
        }

        @keyframes eleganceExplode {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--x), var(--y)) scale(0); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="intro-guide">
        <h1>RESONANCE</h1>
        <p>3-OCTAVE IMMERSIVE EXPERIENCE</p>
    </div>

    <div class="piano-container" id="piano">
        <div class="key white" data-key="49" data-freq="130.81">1</div>
        <div class="key black" data-key="81" data-freq="138.59">Q</div>
        <div class="key white" data-key="50" data-freq="146.83">2</div>
        <div class="key black" data-key="87" data-freq="155.56">W</div>
        <div class="key white" data-key="51" data-freq="164.81">3</div>
        <div class="key white" data-key="52" data-freq="174.61">4</div>
        <div class="key black" data-key="82" data-freq="185.00">R</div>
        <div class="key white" data-key="53" data-freq="196.00">5</div>
        <div class="key black" data-key="84" data-freq="207.65">T</div>
        <div class="key white" data-key="54" data-freq="220.00">6</div>
        <div class="key black" data-key="89" data-freq="233.08">Y</div>
        <div class="key white" data-key="55" data-freq="246.94">7</div>

        <div class="key white" data-key="65" data-freq="261.63">A</div>
        <div class="key black" data-key="83" data-freq="277.18">S</div>
        <div class="key white" data-key="68" data-freq="293.66">D</div>
        <div class="key black" data-key="70" data-freq="311.13">F</div>
        <div class="key white" data-key="71" data-freq="329.63">G</div>
        <div class="key white" data-key="72" data-freq="349.23">H</div>
        <div class="key black" data-key="74" data-freq="369.99">J</div>
        <div class="key white" data-key="75" data-freq="392.00">K</div>
        <div class="key black" data-key="76" data-freq="415.30">L</div>
        <div class="key white" data-key="186" data-freq="440.00">;</div>
        <div class="key black" data-key="222" data-freq="466.16">'</div>
        <div class="key white" data-key="13" data-freq="493.88">Ent</div>

        <div class="key white" data-key="90" data-freq="523.25">Z</div>
        <div class="key black" data-key="88" data-freq="554.37">X</div>
        <div class="key white" data-key="67" data-freq="587.33">C</div>
        <div class="key black" data-key="86" data-freq="622.25">V</div>
        <div class="key white" data-key="66" data-freq="659.25">B</div>
        <div class="key white" data-key="78" data-freq="698.46">N</div>
        <div class="key black" data-key="77" data-freq="739.99">M</div>
        <div class="key white" data-key="188" data-freq="783.99">,</div>
        <div class="key black" data-key="190" data-freq="830.61">.</div>
        <div class="key white" data-key="191" data-freq="880.00">/</div>
        <div class="key black" data-key="16" data-freq="932.33">Shf</div>
        <div class="key white" data-key="32" data-freq="987.77">Spc</div>
    </div>

    <script>
        const keys = document.querySelectorAll('.key');
        const intro = document.getElementById('intro-guide');
        let pulseTimer;

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playTone(freq) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.2);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 1.2);
        }

        function handleInteraction(keyElement) {
            if (!keyElement) return;

            // 텍스트 반짝임 효과 부여
            intro.classList.add('pulse');
            clearTimeout(pulseTimer);
            pulseTimer = setTimeout(() => intro.classList.remove('pulse'), 200);

            playTone(parseFloat(keyElement.dataset.freq));
            keyElement.classList.add('active');
            
            for(let i=0; i<6; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const x = (Math.random() - 0.5) * 200;
                const y = (Math.random() - 1) * 250;
                p.style.setProperty('--x', `${x}px`);
                p.style.setProperty('--y', `${y}px`);
                keyElement.appendChild(p);
                setTimeout(() => p.remove(), 800);
            }
            setTimeout(() => keyElement.classList.remove('active'), 150);
        }

        window.addEventListener('keydown', (e) => {
            if (e.repeat) return;
            if ([32, 13, 186, 188, 190, 191].includes(e.keyCode)) e.preventDefault();
            const key = document.querySelector(`.key[data-key="${e.keyCode}"]`);
            handleInteraction(key);
        });

        keys.forEach(key => {
            key.addEventListener('mousedown', () => handleInteraction(key));
        });

        document.addEventListener('mousedown', () => {
            if (audioCtx.state === 'suspended') audioCtx.resume();
        });
    </script>
</body>
</html>
